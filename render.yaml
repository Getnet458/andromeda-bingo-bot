services:
  - type: web
    name: andromeda-bingo-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn webapp_server:app --bind 0.0.0.0:$PORT

  - type: worker
    name: andromeda-bingo-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python advanced_bot.py